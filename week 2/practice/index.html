<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 2 CSS Practice</title>
    <!-- Practice 1: Custom Font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Week 2: CSS Practice</h1>
        <p>Demonstrating Fonts, Flexbox, Grid, and Hover Effects</p>
    </header>

    <main class="container">

        <!-- Practice 2: Flexbox Centering -->
        <section class="flexbox-section">
            <h2>Flexbox Centering</h2>
            <div class="flex-container">
                <div class="flex-item">
                    <p>I am centered vertically and horizontally using Flexbox!</p>
                </div>
            </div>
        </section>

        <!-- Practice 3: CSS Grid 3-Column Layout -->
        <section class="grid-section">
            <h2>CSS Grid Layout (3 Columns)</h2>
            <div class="grid-container">
                <div class="grid-item">Column 1</div>
                <div class="grid-item">Column 2</div>
                <div class="grid-item">Column 3</div>
                <div class="grid-item">Column 4</div>
                <div class="grid-item">Column 5</div>
                <div class="grid-item">Column 6</div>
            </div>
        </section>

        <!-- Practice 4: Hover Effects -->
        <section class="hover-section">
            <h2>Hover Effects</h2>
            <div class="hover-demo">
                <a href="#" class="custom-link">Hover over this link</a>
                <button class="custom-btn">Hover over this button</button>
            </div>
        </section>

    </main>

</body>
</html>
