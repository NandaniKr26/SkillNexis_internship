<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-graduation-cap"></i> EduDash</h2>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fa-solid fa-users"></i> Students</a></li>
                <li><a href="#"><i class="fa-solid fa-chart-pie"></i> Analytics</a></li>
                <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-title">
                    <h1>Student Management</h1>
                    <p>Manage, track, and update student records efficiently.</p>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Admin">
                    <span>Admin</span>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <section class="stats-cards">
                <div class="card">
                    <div class="card-icon blue"><i class="fa-solid fa-users"></i></div>
                    <div class="card-info">
                        <h3>Total Students</h3>
                        <p id="total-students">0</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon green"><i class="fa-solid fa-check-circle"></i></div>
                    <div class="card-info">
                        <h3>Active Courses</h3>
                        <p>5</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon orange"><i class="fa-solid fa-star"></i></div>
                    <div class="card-info">
                        <h3>Top Performers</h3>
                        <p id="top-performers">0</p>
                    </div>
                </div>
            </section>

            <!-- Table Section -->
            <section class="table-section">
                <div class="table-controls">
                    <div class="search-filter">
                        <div class="search-box">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="search-input" placeholder="Search by name, ID, or email...">
                        </div>
                        <div class="filter-box">
                            <select id="course-filter">
                                <option value="all">All Courses</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Civil">Civil</option>
                                <option value="IT">IT</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="add-student-btn">
                        <i class="fa-solid fa-plus"></i> Add Student
                    </button>
                </div>

                <div class="table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Course</th>
                                <th>Grade (%)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                    <div id="no-data-msg" class="no-data hidden">
                        <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="No data" width="100">
                        <p>No student records found.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Add/Edit Student -->
    <div class="modal-overlay hidden" id="student-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Student</h2>
                <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="student-form">
                    <input type="hidden" id="student-id">

                    <div class="form-group">
                        <label for="rollNo">Roll Number</label>
                        <input type="text" id="rollNo" required placeholder="e.g. CS101">
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="Enter full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="student@example.com">
                    </div>

                    <div class="form-group">
                        <label for="course">Course</label>
                        <select id="course" required>
                            <option value="" disabled selected>Select Course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Civil">Civil</option>
                            <option value="IT">IT</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="grade">Grade / Marks (%)</label>
                        <input type="number" id="grade" required min="0" max="100" placeholder="0-100">
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Student</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
